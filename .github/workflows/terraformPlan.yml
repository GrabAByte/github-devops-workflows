---
name: Terraform Plan
'on':
  workflow_call:
    inputs:
      terraformPath:
        required: true
        type: string

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4

      - name: Plan Terraform
        run: |
          cd ${{ inputs.terraformPath }} && \
          terraform init && \
          terraform plan || :
