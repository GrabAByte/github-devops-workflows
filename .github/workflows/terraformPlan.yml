---
name: Terraform Plan
'on':
  workflow_call:
    inputs:
      terraformPath:
        required: true
        type: string

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4

      - name: Plan Terraform
        env:
          AWS_PROFILE: 'default'
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd ${{ inputs.terraformPath }} && \
          echo '[default]' > .aws_credentials
          echo 'aws_access_key_id=$AWS_ACCESS_KEY_ID' >> .aws_credentials
          echo 'aws_secret_access_key=$AWS_SECRET_ACCESS_KEY' >> .aws_credentials
          echo 'region=eu-west-1' >> .aws_credentials
          terraform init && \
          terraform plan || :
